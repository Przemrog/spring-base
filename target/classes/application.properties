spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notesdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notes}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notes}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.thymeleaf.cache=false

# [OWASP A02/A10] szczegolowe komunikaty bledu i slad stosu - wariant bazowy
server.error.include-stacktrace=always
server.error.include-message=always

app.jwt.secret=${APP_JWT_SECRET:dev-only-insecure-signing-key-change-me-please-0123456789}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
